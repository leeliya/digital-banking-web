<div class="container mt-2">
  @if (customers) {
    <div class="card">
      <div class="card-header">Customers</div>
      <div class="card-body">
        <table class="table">
          <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Email</th>
          </tr>
          </thead>
          <tbody>
            @for(customer of customers| async ; track customer.id)
            {
              <tr >
                <th scope="row">{{customer.id}}</th>
                <td>{{customer.name}}</td>
                <td>{{customer.email}}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }
</div>
